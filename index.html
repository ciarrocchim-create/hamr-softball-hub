            <button class="btn btn-red btn-sm" onclick="delGame('${g.id}')">✕</button>
          </div>
        </div>
        <div class="row" style="gap:4px;flex-wrap:wrap">${chips}</div>
      </div>`;
    }).join('');
  return `<div class="row" style="margin-bottom:18px"><h2 class="st">⚾ Lineup Tracker</h2><div class="f1"></div>${DB.games.length?`<button class="btn btn-blue btn-sm" onclick="showPT()">📊 Playing Time</button>`:''}&nbsp;<button class="btn btn-gold" onclick="editGame(null)">+ New Game</button></div>${rows}`;
}
// ── GAME EDITOR ───────────────────────────────────────────
let _gTab='lineup'; // 'lineup' or 'grid'

function editGame(id){
  const isNew=!id;
  if(isNew){
    EG={id:uid(),date:new Date().toISOString().slice(0,10),opponent:'',innings:6,
      lineup:DB.players.map(p=>({playerId:p.id,battingSpot:0,positions:[],inningsPlayed:0})),
      inningGrid:{},altGrid:{winning:{},losing:{}} // alt lineups for blowout situations
    };
  } else {
    EG=JSON.parse(JSON.stringify(DB.games.find(g=>g.id===id)));
    const ids=new Set(EG.lineup.map(l=>l.playerId));
    DB.players.filter(p=>!ids.has(p.id)).forEach(p=>EG.lineup.push({playerId:p.id,battingSpot:0,positions:[],inningsPlayed:0}));
    if(!EG.inningGrid)EG.inningGrid={};
    if(!EG.altGrid)EG.altGrid={winning:{},losing:{}};
    // Migrate old inningGrid format (keyed by batting spot) to new format (keyed by playerId)
    migrateInningGrid();
  }
  _gTab='lineup';
  showGameModal(isNew);
}

function showGameModal(isNew){
  if(!EG)return;
  migrateInningGrid(); // ensure clean pid-keyed format on every render
  const tabBtns=`<div class="row" style="gap:6px;margin-bottom:16px">
    <button class="tog${_gTab==='lineup'?' on':''}" onclick="_gTab='lineup';showGameModal(${isNew})">📋 Batting Order & Tracking</button>
    <button class="tog${_gTab==='grid'?' on':''}" onclick="_gTab='grid';showGameModal(${isNew})">📊 Inning-by-Inning Planner</button>
  </div>`;

  const header=`${mhdr(isNew?'New Game':'Edit Game')}
    <div class="row" style="gap:8px;margin-bottom:14px">
      <div class="f1"><div class="lbl">Opponent</div><input id="g-opp" value="${esc(EG.opponent)}" placeholder="Team name" onchange="EG.opponent=this.value"/></div>
      <div><div class="lbl">Date</div><input type="date" id="g-date" value="${EG.date}" style="width:155px" onchange="EG.date=this.value"/></div>
      <div><div class="lbl">Innings</div><select style="width:80px" onchange="EG.innings=parseInt(this.value);showGameModal(${isNew})">${[4,5,6,7].map(n=>`<option value="${n}"${EG.innings===n?' selected':''}>${n}</option>`).join('')}</select></div>
    </div>`;

  let body='';
  if(_gTab==='lineup'){
    // Split into active (in order) and bench (no spot or out)
    const active=[...EG.lineup].filter(e=>!e.outForGame).sort((a,b)=>(a.battingSpot||99)-(b.battingSpot||99));
    const bench=EG.lineup.filter(e=>e.outForGame);

    const makeRow=(ent,idx)=>{
      const p=getPlayer(ent.playerId);if(!p)return'';
      const isOut=ent.outForGame||false;
      const spot=ent.battingSpot||0;

      return `<tr id="bo-row-${ent.playerId}"
          draggable="${isOut?'false':'true'}"
          ondragstart="onBODragStart(event,'${ent.playerId}')"
          ondragend="onBODragEnd(event)"
          ondragover="onBODragOver(event,'${ent.playerId}')"
          ondrop="onBODrop(event,'${ent.playerId}')"
          style="opacity:${isOut?'.45':'1'};background:${isOut?'var(--dim)':'transparent'};transition:.1s">
        <td style="padding:5px 6px;width:20px">
          ${isOut?'':`<span style="color:var(--muted);font-size:16px;cursor:grab;user-select:none" title="Drag to reorder">⠿</span>`}
        </td>
        <td style="padding:3px 4px;width:52px">
          <input type="number" min="1" max="30"
            value="${spot||''}"
            placeholder="—"
            ${isOut?'disabled':''}
            style="width:48px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;color:var(--gold);background:transparent;border:1px solid var(--border);border-radius:6px;padding:2px 4px"
            onchange="setBattingSpot('${ent.playerId}',this.value)"
          />
        </td>
        <td style="padding:5px 8px;font-weight:600;white-space:nowrap;font-size:12px">
          #${esc(p.number||'—')} ${esc(p.name.split(' ')[0])} ${esc(p.name.split(' ').slice(1).join(' '))}
          ${isOut?'<span class="badge" style="background:var(--red)22;color:var(--red);font-size:9px;margin-left:4px">OUT</span>':''}
        </td>
        <td style="padding:5px 8px"><input type="number" value="${ent.inningsPlayed||''}" placeholder="0" style="width:50px;text-align:center;font-size:12px" min="0" ${isOut?'disabled':''} onchange="updGL('${ent.playerId}','inningsPlayed',parseInt(this.value)||0)"/></td>
        <td style="padding:5px 8px">
          <button class="btn btn-xs ${isOut?'btn-gold':'btn-dim'}" onclick="updGL('${ent.playerId}','outForGame',${!isOut});showGameModal(false)">
            ${isOut?'↩ In':'Out'}
          </button>
        </td>
      </tr>`;
    };

    const activeRows=active.map((e,i)=>makeRow(e,i)).join('');
    const benchRows=bench.map((e,i)=>makeRow(e,i)).join('');

    body=`<div class="row" style="margin-bottom:10px;gap:8px;flex-wrap:wrap">
      <div style="font-size:11px;color:var(--muted)">⠿ Drag to reorder. Numbers update automatically.</div>
      <div class="f1"></div>
      <button class="btn btn-dim btn-sm" onclick="fixRenumber()">🔧 Fix &amp; Renumber</button>
    </div>
    <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">
      <thead><tr><th style="width:20px"></th><th style="width:28px">Bat #</th><th>Player</th><th>Inn.</th><th>Status</th></tr></thead>
      <tbody id="bo-tbody">${activeRows}
      ${benchRows?`<tr><td colspan="6" style="padding:8px;font-size:11px;color:var(--muted);border-top:2px solid var(--border)">Not playing this game:</td></tr>${benchRows}`:''}
      </tbody>
    </table></div>`;

  } else {
    // Inning-by-inning grid planner
    // Batting order from lineup
    const ordered=[...EG.lineup].filter(e=>e.battingSpot>0).sort((a,b)=>a.battingSpot-b.battingSpot);
    const unset=EG.lineup.filter(e=>!e.battingSpot||e.battingSpot===0);
    const allInOrder=[...ordered,...unset];
    const numInnings=EG.innings||6;
    const posOpts=`<option value="">—</option>${POSITIONS.map(pos=>`<option value="${pos}">${pos}</option>`).join('')}<option value="BN">BN – Bench</option>`;

    if(!ordered.length){
      body=`<div class="surface" style="text-align:center;padding:24px;color:var(--muted);font-size:13px">
        Set batting order numbers in the <strong style="color:var(--text)">Batting Order & Tracking</strong> tab first, then come back here to plan each inning.
      </div>`;
    } else {
      // Build the grid - rows=batting spots, cols=innings + 2 alt scenarios
      if(!EG.altGrid)EG.altGrid={winning:{},losing:{}};

      const inningHeaders=Array.from({length:numInnings},(_,i)=>`<th style="text-align:center;min-width:72px;padding:4px 4px;font-size:11px;color:var(--muted)">Inn ${i+1}<br/><button class="btn btn-dim btn-xs" style="margin-top:3px;font-size:9px;padding:2px 5px" onclick="showFieldView(${i+1})">🏟 View</button></th>`).join('')
        +`<th style="width:8px;background:var(--navy)"></th>`
        +`<th style="text-align:center;min-width:80px;padding:6px 4px;font-size:11px;color:var(--green);background:var(--green)0a;border-left:3px solid var(--green)44">🏆 Winning<br/><span style="font-size:9px;font-weight:400;opacity:.7">Big lead</span></th>`
        ;

      // Build conflict map: per inning, which positions are used more than once
      // Only count entries whose key IS a valid active player ID
      // This filters out both out-for-game players AND stale old-format entries (batting spot keys)
      const activePids=new Set(EG.lineup.filter(e=>!e.outForGame).map(e=>e.playerId));
      const outPids=new Set(EG.lineup.filter(e=>e.outForGame).map(e=>e.playerId));

      const conflictMap={}; // {inn: Set of conflicted positions}
      for(let inn=1;inn<=numInnings;inn++){
        const inningData=EG.inningGrid[inn]||{};
        const posCounts={};
        Object.entries(inningData).forEach(([pid,cell])=>{
          if(!activePids.has(pid))return; // only count valid active player IDs
          const pos=(cell.subPlayerId?cell.subPosition:cell.position)||'';
          if(pos&&pos!=='BN')posCounts[pos]=(posCounts[pos]||0)+1;
        });
        const conflicts=new Set(Object.entries(posCounts).filter(([,c])=>c>1).map(([p])=>p));
        if(conflicts.size>0)console.log(`Inn ${inn} conflicts:`,{conflicts:[...conflicts],posCounts,inningData:JSON.parse(JSON.stringify(EG.inningGrid[inn]||{}))});
        conflictMap[inn]=conflicts;
      }
      // Available subs (players not in batting order or marked out)
      const subPlayers=EG.lineup.filter(e=>!e.outForGame).map(e=>getPlayer(e.playerId)).filter(Boolean);

      const gridRows=allInOrder.filter(e=>!e.outForGame).map(ent=>{
        const p=getPlayer(ent.playerId);if(!p)return'';
        const spot=String(ent.battingSpot||0);

        // Pre-compute all positions for this player across all innings
        const playerPosArr=Array.from({length:numInnings},(_,i)=>{
          const c=EG.inningGrid[i+1]?.[ent.playerId]||{};
          return (c.subPlayerId?c.subPosition:c.position)||'';
        });
        const totalBenchInnings=playerPosArr.filter(p=>p==='BN').length;
        // Compute consecutive streak for each inning
        // streak[i] = {playStreak, benchStreak} ending AT inning i
        const streaks=playerPosArr.map((pos,i)=>{
          const isPlaying=pos&&pos!=='BN';
          const isBench=pos==='BN';
          const isUnset=!pos;
          let playStreak=0,benchStreak=0;
          if(isPlaying){
            for(let j=i;j>=0;j--){const p=playerPosArr[j];if(p&&p!=='BN')playStreak++;else break;}
          }
          if(isBench){
            for(let j=i;j>=0;j--){if(playerPosArr[j]==='BN')benchStreak++;else break;}
          }
          return{playStreak,benchStreak};
        });

        const regularCells=Array.from({length:numInnings},(_,inn)=>{
          const inningData=EG.inningGrid[inn+1]||{};
          const cell=inningData[ent.playerId]||{};
          const subP=cell.subPlayerId?getPlayer(cell.subPlayerId):null;
          const activePid=subP?cell.subPlayerId:ent.playerId;
          const curPos=(subP?cell.subPosition:cell.position)||'';
          const isConflict=curPos&&curPos!=='BN'&&conflictMap[inn+1]?.has(curPos);
          const isBench=curPos==='BN';
          const isPlaying=curPos&&!isBench;
          const {playStreak,benchStreak}=streaks[inn];

          // Consecutive warnings override normal coloring
          let cellBg,cellBorder,streakLabel='';
          if(isConflict){
            cellBg='var(--red)33';cellBorder='var(--red)';
          } else if(isPlaying&&playStreak>=4){
            cellBg='rgba(241,107,107,.28)';cellBorder='var(--red)';streakLabel=`<div style="font-size:9px;color:var(--red);font-weight:700">${playStreak} in a row</div>`;
          } else if(isPlaying&&playStreak>=3){
            cellBg='rgba(240,165,0,.22)';cellBorder='var(--gold)';streakLabel=`<div style="font-size:9px;color:var(--gold);font-weight:700">${playStreak} in a row</div>`;
          } else if(isBench&&benchStreak>=3){
            cellBg='rgba(241,107,107,.22)';cellBorder='var(--red)';streakLabel=`<div style="font-size:9px;color:var(--red);font-weight:700">${benchStreak} bench row</div>`;
          } else if(isBench&&benchStreak>=2){
            cellBg='rgba(240,165,0,.18)';cellBorder='var(--gold)';streakLabel=`<div style="font-size:9px;color:var(--gold);font-weight:700">${benchStreak} bench row</div>`;
          } else if(isPlaying){
            cellBg='var(--green)18';cellBorder='var(--green)44';
          } else if(isBench&&totalBenchInnings>2){
            cellBg='rgba(241,107,107,.18)';cellBorder='var(--red)44';streakLabel=`<div style="font-size:9px;color:var(--red);font-weight:700">${totalBenchInnings} bench total</div>`;
          } else if(isBench){
            cellBg='var(--dim)';cellBorder='var(--border)';
          } else {
            cellBg='var(--surface)';cellBorder='var(--border)';
          }

          // Sub player options
          const subOpts=`<option value="">— no sub —</option>${subPlayers.filter(sp=>sp.id!==ent.playerId).map(sp=>`<option value="${sp.id}"${cell.subPlayerId===sp.id?' selected':''}>${esc(sp.name.split(' ')[0])}</option>`).join('')}`;

          return `<td style="padding:2px 2px;text-align:center;vertical-align:top">
            ${subP?`<div style="font-size:9px;color:var(--purple,#c97af5);font-weight:700;text-align:center">SUB: ${esc(subP.name.split(' ')[0])}</div>`:''}
            <select style="width:68px;font-size:11px;text-align:center;background:${cellBg};border-color:${cellBorder}"
              onchange="updGrid(${inn+1},'${ent.playerId}','${activePid}',this.value)">
              ${posOpts.replace(`value="${curPos}"`,`value="${curPos}" selected`)}
            </select>
            ${isConflict?`<div style="font-size:9px;color:var(--red);font-weight:700">⚠ conflict</div>`:''}
            ${streakLabel}
            <details style="margin-top:2px">
              <summary style="font-size:9px;color:var(--muted);cursor:pointer;list-style:none;text-align:center">sub ▾</summary>
              <select style="width:68px;font-size:10px;margin-top:2px" onchange="updGridSub(${inn+1},'${ent.playerId}',this.value)">
                ${subOpts}
              </select>
              ${subP?`<select style="width:68px;font-size:10px;margin-top:2px" onchange="updGridSubPos(${inn+1},'${ent.playerId}',this.value)">
                ${posOpts.replace(`value="${cell.subPosition||''}"`,`value="${cell.subPosition||''}" selected`)}
              </select>`:''}
            </details>
          </td>`;
        }).join('');

        const winPos=(EG.altGrid.winning[ent.playerId]||{}).position||'';
        const winConflict=false; // alt lineups don't conflict-check for now
        const altCells=`<td style="width:8px;background:var(--navy)"></td>
          <td style="padding:3px 2px;text-align:center;background:var(--green)06;border-left:3px solid var(--green)44">
            <select style="width:72px;font-size:11px;text-align:center;background:${winPos?'var(--green)22':'var(--surface)'};border-color:${winPos?'var(--green)':'var(--border)'}"
              onchange="updAltGrid('winning','${ent.playerId}',this.value)">
              ${posOpts.replace(`value="${winPos}"`,`value="${winPos}" selected`)}
            </select>
          </td>
`;

        const spotBadge=ent.battingSpot?`<span style="color:var(--gold);font-weight:800;font-size:13px;min-width:18px;display:inline-block">${ent.battingSpot}.</span>`:`<span style="color:var(--dim);font-size:11px">—</span>`;
        return `<tr style="border-bottom:1px solid var(--border)">
          <td style="padding:6px 8px;white-space:nowrap;font-size:12px;font-weight:600;min-width:110px">
            ${spotBadge} ${esc(p.name.split(' ')[0])} <span style="color:var(--muted);font-size:10px">#${esc(p.number||'')}</span>
            ${totalBenchInnings>0?`<span style="display:inline-block;margin-left:4px;font-size:10px;font-weight:800;padding:1px 6px;border-radius:10px;background:${totalBenchInnings>2?'var(--red)33':totalBenchInnings>0?'var(--gold)22':'var(--dim)'};color:${totalBenchInnings>2?'var(--red)':totalBenchInnings>0?'var(--gold)':'var(--muted)'}">BN:${totalBenchInnings}</span>`:''}
          </td>
          ${regularCells}${altCells}
        </tr>`;
      }).join('');
      // Row for out-for-game players
      const outRow=EG.lineup.filter(e=>e.outForGame).map(e=>{const p=getPlayer(e.playerId);return p?`<span class="badge" style="background:var(--red)22;color:var(--red)">OUT: ${esc(p.name.split(' ')[0])}</span>`:''}).join(' ');

      // Copy inning button row
      const copyBtns=Array.from({length:numInnings},(_,inn)=>inn===0?'<td></td>':`<td style="text-align:center;padding:2px 2px"><button class="btn btn-dim btn-xs" onclick="copyInning(${inn})" title="Copy Inn ${inn}">↙${inn}</button></td>`).join('')
        +'<td style="width:8px"></td><td></td><td></td>';

      const clearBtns='<td style="padding:2px 6px;font-size:9px;color:var(--muted);font-weight:700;white-space:nowrap">✕ clear:</td>'
        +Array.from({length:numInnings},(_,inn)=>
          `<td style="text-align:center;padding:2px 2px"><button class="btn btn-xs" style="background:var(--red)18;color:var(--red);border:1px solid var(--red)33;padding:2px 6px;font-size:9px;border-radius:4px;cursor:pointer" onclick="clearInning(${inn+1})">Inn ${inn+1}</button></td>`
        ).join('') + '<td style="width:8px"></td><td></td><td></td>';

      const anyConflict=Object.values(conflictMap).some(s=>s.size>0);

      // Build "missing positions" footer row per inning
      const FIELD_POS=['P','C','1B','2B','3B','SS','LF','CF','RF','FLEX'];
      const missingRows=Array.from({length:numInnings},(_,inn)=>{
        const inningData=EG.inningGrid[inn+1]||{};
        const filled=new Set(Object.entries(inningData)
          .filter(([pid])=>activePids.has(pid))
          .map(([,c])=>(c.subPlayerId?c.subPosition:c.position)||'').filter(p=>p&&p!=='BN'));
        const missing=FIELD_POS.filter(p=>!filled.has(p));
        const allGood=missing.length===0;
        return `<td style="padding:4px 2px;text-align:center;vertical-align:top;background:${allGood?'var(--green)0a':'var(--red)0a'}">
          ${allGood
            ? `<span style="color:var(--green);font-size:11px;font-weight:700">✓ Full</span>`
            : missing.map(p=>`<span style="display:inline-block;background:var(--red)22;color:var(--red);border-radius:4px;padding:1px 5px;font-size:10px;font-weight:700;margin:1px">${p}</span>`).join('')
          }
        </td>`;
      }).join('') + '<td style="width:8px"></td>'
      + (()=>{
          const wf=new Set(Object.values(EG.altGrid?.winning||{}).map(c=>c.position||'').filter(p=>p&&p!=='BN'));
          const wm=FIELD_POS.filter(p=>!wf.has(p));
          return `<td style="padding:4px 2px;text-align:center;vertical-align:top;background:${wm.length===0?'var(--green)0a':'var(--red)0a'};border-left:3px solid var(--green)44">${wm.length===0?'<span style="color:var(--green);font-size:11px;font-weight:700">✓ Full</span>':wm.map(p=>`<span style="display:inline-block;background:var(--red)22;color:var(--red);border-radius:4px;padding:1px 5px;font-size:10px;font-weight:700;margin:1px">${p}</span>`).join('')}</td>`;
        })()
;

      body=`<div style="overflow-x:auto">
        ${anyConflict?'<div style="background:var(--red)18;border:1px solid var(--red)44;border-radius:8px;padding:8px 12px;font-size:12px;color:var(--red);margin-bottom:8px">⚠ Position conflicts detected — same position assigned to two players in the same inning</div>':''}
        <div style="font-size:11px;color:var(--muted);margin-bottom:8px;display:flex;gap:12px;flex-wrap:wrap">
          <span>🟢 Playing</span>
          <span>🟡 2 in a row (play or bench)</span>
          <span>🔴 3+ in a row (play or bench) or conflict</span>
          <span style="color:var(--border)">⬜ Unassigned</span>
          <span>"sub ▾" to substitute</span>
        </div>
        <table style="border-collapse:collapse;width:100%">
          <thead>
            <tr><th style="text-align:left;padding:6px 8px;font-size:11px;min-width:110px">Player</th>${inningHeaders}</tr>
            <tr style="background:var(--dim)">${copyBtns}</tr>
            <tr style="background:var(--red)0a">${clearBtns}</tr>
          </thead>
          <tbody>${gridRows}
          ${outRow?`<tr><td colspan="${numInnings+4}" style="padding:8px;font-size:11px;color:var(--muted);border-top:1px solid var(--border)">Not playing: ${outRow}</td></tr>`:''}
          </tbody>
          <tfoot>
            <tr style="border-top:2px solid var(--border)">
              <td style="padding:5px 8px;font-size:10px;font-weight:700;color:var(--muted);white-space:nowrap">Missing positions</td>
              ${missingRows}
            </tr>
          </tfoot>
        </table>
      </div>`;
    }
  }

  showModal(`${header}${tabBtns}${body}
    <div class="row" style="margin-top:14px;gap:8px">
      <button class="btn btn-gold" onclick="saveGame(${isNew})">Save Game</button>
      <button class="btn btn-blue btn-sm" onclick="printLineupCard()">🖨 Print Lineup Card</button>
      <button class="btn btn-dim" onclick="closeModal()">Cancel</button>
    </div>`,true);
}

function updGrid(inning,spot,pid,pos){
  if(!EG)return;
  if(!EG.inningGrid)EG.inningGrid={};
  if(!EG.inningGrid[inning])EG.inningGrid[inning]={};
  const existing=EG.inningGrid[inning][pid]||{};
  EG.inningGrid[inning][pid]={...existing,position:pos};
  // Mark playing time
  const hasPlayed=Object.values(EG.inningGrid).some(inn=>inn[pid]&&inn[pid].position&&inn[pid].position!=='BN');
  const le=EG.lineup.find(e=>e.playerId===pid);
  if(le&&hasPlayed&&!le.inningsPlayed)le.inningsPlayed=1;
  // Re-render grid to update streaks, conflicts, missing positions, and field diagrams
  _gTab='grid';showGameModal(false);
}
function updGridSub(inning,origPid,subPid){
  if(!EG)return;
  if(!EG.inningGrid)EG.inningGrid={};
  if(!EG.inningGrid[inning])EG.inningGrid[inning]={};
  const existing=EG.inningGrid[inning][origPid]||{position:''};
  if(!subPid){delete existing.subPlayerId;delete existing.subPosition;}
  else{existing.subPlayerId=subPid;existing.subPosition=existing.subPosition||'';}
  EG.inningGrid[inning][origPid]=existing;
  _gTab='grid';showGameModal(false);
}
function updGridSubPos(inning,origPid,pos){
  if(!EG||!EG.inningGrid?.[inning]?.[origPid])return;
  EG.inningGrid[inning][origPid].subPosition=pos;
  _gTab='grid';showGameModal(false);
}
function updAltGrid(scenario,pid,pos){
  if(!EG)return;
  if(!EG.altGrid)EG.altGrid={winning:{},losing:{}};
  EG.altGrid[scenario][pid]={position:pos};
}
function copyInning(fromInn){
  if(!EG)return;
  if(!EG.inningGrid)EG.inningGrid={};

function onBODrop(e,targetPid){
  e.preventDefault();
  document.querySelectorAll('#bo-tbody tr').forEach(r=>r.style.background='');
  if(!_boDrag||_boDrag===targetPid||!EG)return;

  // Work with ALL non-out players so order is consistent with what's displayed
  const active=EG.lineup.filter(x=>!x.outForGame).sort((a,b)=>(a.battingSpot||999)-(b.battingSpot||999));
  const fromIdx=active.findIndex(x=>x.playerId===_boDrag);
  const toIdx=active.findIndex(x=>x.playerId===targetPid);
  if(fromIdx<0||toIdx<0){_boDrag=null;return;}

  // Reorder
  const moved=active.splice(fromIdx,1)[0];
  active.splice(toIdx,0,moved);

  // Save old spot→playerId map before renumbering (for inningGrid remap)
  const oldSpotToPid={};
  EG.lineup.forEach(e=>{if(e.battingSpot>0)oldSpotToPid[e.battingSpot]=e.playerId;});

  // Reassign sequential spots to ALL active players in their new order
  // Players who previously had no spot get one now; that's intentional when dragging
  active.forEach((ent,i)=>{
    const lineupEnt=EG.lineup.find(x=>x.playerId===ent.playerId);

  // Build new pid→spot map
  const newPidToSpot={};
  EG.lineup.forEach(e=>{if(e.battingSpot>0)newPidToSpot[e.playerId]=e.battingSpot;});

  // inningGrid is keyed by pid — no remap needed after renumbering
  _boDrag=null;
  showGameModal(false);
}

      const count=r.pc[pos]||0;
      const pctBar=Math.round((count/maxForPos[pos])*100);
      return `<td style="text-align:center;padding:5px 3px">
        ${count>0?`<div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;color:var(--gold)">${count}</div>
        <div style="background:var(--surface);border-radius:2px;height:4px;width:32px;margin:2px auto">
          <div style="background:var(--gold);height:100%;border-radius:2px;width:${pctBar}%"></div>
        </div>`:'<span style="color:var(--dim);font-size:11px">—</span>'}
      </td>`;
    }).join('');
    return `<tr style="border-bottom:1px solid var(--border)">
      <td style="padding:7px 10px;font-weight:700;white-space:nowrap">#${esc(r.p.number||'—')} ${esc(r.p.name)}</td>
      <td style="text-align:center;padding:7px 6px;color:var(--muted)">${r.gP}</td>
      <td style="text-align:center;padding:7px 6px">
        <span style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;color:${col}">${r.totI}</span>
        <div style="background:var(--surface);border-radius:3px;height:4px;width:44px;display:inline-block;vertical-align:middle;margin-left:5px">
          <div style="background:${col};height:100%;border-radius:3px;width:${Math.min(pct,100)}%"></div>
        </div>
        <span style="font-size:10px;color:var(--muted);margin-left:3px">${pct}%</span>
      </td>
      <td style="text-align:center;padding:7px 6px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;color:var(--blue)">${r.innPerGame}</td>
      <td style="text-align:center;padding:7px 6px">
        <span style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;color:${benchCol}">${r.totBench}</span>
        <span style="font-size:10px;color:var(--muted);margin-left:4px">(${r.benchPerGame}/gm)</span>
      </td>
      <td style="text-align:center;padding:7px 6px;color:var(--muted);font-size:13px">${r.avgB}</td>
      ${posCells}
    </tr>`;
  }).join('');

  showModal(`${mhdr('📊 Playing Time Report')}
    <div style="font-size:11px;color:var(--muted);margin-bottom:10px">
      Per-game averages exclude games where player was out. Bench innings shown in 
      <span style="color:var(--green)">green</span> / 
      <span style="color:var(--gold)">yellow</span> / 
      <span style="color:var(--red)">red</span> (0 / 1–2 / 3+).
    </div>
    <div style="overflow-x:auto"><table>
      <thead><tr>
        <th style="text-align:left;padding:6px 10px">Player</th>
        <th style="text-align:center;padding:6px 5px;font-size:10px;color:var(--muted)">Games</th>
        <th style="text-align:center;padding:6px 5px;font-size:10px;color:var(--muted)">Total Inn.</th>
        <th style="text-align:center;padding:6px 5px;font-size:10px;color:var(--blue)">Inn/Game</th>
        <th style="text-align:center;padding:6px 5px;font-size:10px;color:var(--muted)">Bench Inn.</th>
        <th style="text-align:center;padding:6px 5px;font-size:10px;color:var(--muted)">Avg Bat</th>
        ${posHeaders}
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`,true);
}

// ═══ STATS ═══════════════════════════════════════════════
function renderStats(){
  const all=DB.gcStats||[];
  const cols=all.length?Object.keys(all[0]).filter(k=>!k.startsWith('_')):[];
  const KEY=['AB','R','H','2B','3B','HR','RBI','BB','K','SB','AVG','OBP','SLG','OPS'];
  const disp=KEY.filter(k=>cols.includes(k)).length?KEY.filter(k=>cols.includes(k)):cols.slice(0,10);
  const isKey=k=>['AVG','OBP','SLG','OPS'].includes(k);
  const groups=DB.players.map(p=>({p,rows:all.filter(r=>r._playerId===p.id)})).filter(x=>x.rows.length>0);
  const unmatched=all.filter(r=>!r._playerId);
  const tables=groups.map(({p,rows})=>`<div class="card" style="margin-bottom:14px">
    <div style="font-weight:700;font-size:14px;margin-bottom:10px">#${esc(p.number||'—')} ${esc(p.name)}</div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>Label</th><th>Date</th>${disp.map(k=>`<th style="color:${isKey(k)?'var(--gold)':'var(--muted)'}">${k}</th>`).join('')}</tr></thead>
      <tbody>${rows.map(r=>`<tr><td style="color:var(--muted);white-space:nowrap">${esc(r._label||'')}</td><td style="color:var(--muted);white-space:nowrap">${esc(r._date||'')}</td>${disp.map(k=>`<td style="text-align:center;font-weight:${isKey(k)?700:400};color:${isKey(k)?'var(--gold)':'var(--text)'}">${r[k]||'—'}</td>`).join('')}</tr>`).join('')}</tbody>
    </table></div>
  </div>`).join('');
  return `<div class="row" style="margin-bottom:18px"><h2 class="st">📊 Stats</h2><div class="f1"></div>
    <button class="btn btn-gold" onclick="showStatsImport()">📥 Import GameChanger CSV</button>
  </div>
  ${all.length===0?'<div class="empty">No stats imported yet. Export from GameChanger and import the CSV.</div>':''}
  ${tables}
  ${unmatched.length?`<div class="card"><div style="font-weight:700;margin-bottom:8px;color:var(--muted)">⚠ ${unmatched.length} rows not matched to a roster player</div>
    <div style="overflow-x:auto"><table><thead><tr><th>Name</th>${disp.map(k=>`<th>${k}</th>`).join('')}</tr></thead>
    <tbody>${unmatched.map(r=>`<tr><td style="font-weight:600">${esc(r['Player Name']||r['Name']||'?')}</td>${disp.map(k=>`<td style="text-align:center">${r[k]||'—'}</td>`).join('')}</tr>`).join('')}</tbody>
    </table></div></div>`:''}`;
}
function showStatsImport(){
  showModal(`${mhdr('📥 Import GameChanger Stats CSV')}
    <div class="col">
      <div class="surface tip">Export from GameChanger: Team → Stats → Export CSV</div>
      <div><div class="lbl">Label (e.g. "Week 3", "vs Tigers")</div><input id="s-lbl" placeholder="Season Totals"/></div>
      <div><div class="lbl">Date</div><input type="date" id="s-dt" value="${new Date().toISOString().slice(0,10)}"/></div>
      <div><div class="lbl">CSV File</div><input type="file" accept=".csv,.txt" onchange="handleStatsCSV(this)"/></div>
      <div id="stats-preview"></div>
    </div>`);
}
function handleStatsCSV(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const rows=parseCSV(ev.target.result);
    const lbl=document.getElementById('s-lbl').value||'Import';
    const dt=document.getElementById('s-dt').value||new Date().toISOString().slice(0,10);
    const mapped=rows.map(row=>{
      const rawName=(row['Player Name']||row['Name']||row['Player']||'').trim();
      const matched=DB.players.find(p=>p.name.toLowerCase()===rawName.toLowerCase()||p.name.toLowerCase().split(' ')[0]===rawName.toLowerCase().split(' ')[0]);
      return{...row,_playerId:matched?.id||null,_label:lbl,_date:dt};
    });
    document.getElementById('stats-preview').innerHTML=`
      <div style="color:var(--green);font-weight:700;margin-bottom:8px">${mapped.length} rows parsed — ${mapped.filter(r=>r._playerId).length} matched to roster</div>
      <div class="row" style="gap:8px">
        <button class="btn btn-gold" onclick="confirmStats(${JSON.stringify(mapped).replace(/'/g,'&#39;').replace(/\//g,'&#47;')})">✓ Import</button>
        <button class="btn btn-dim" onclick="closeModal()">Cancel</button>
      </div>`;
  };
  reader.readAsText(file);input.value='';
}
function confirmStats(rows){DB.gcStats=[...(DB.gcStats||[]),...rows];closeModal();scheduleSave();renderTab();}

// ═══ INIT ═════════════════════════════════════════════════
// ═══ DAD JOKES ══════════════════════════════════════════
const SEED_JOKES=[
  "My wife told me to pick up a 6 pack of Sprite at the store. But when I got home I realized I had picked 7 Up!",
  "Why did the scarecrow win an award? He was outstanding in his field!",
  "I had this sweater that just picked up ridiculous amounts of static electricity. I had to return it. They gave me another one free of charge!",
  "I really wanted to start a new diet. But I just feel like I have too much on my plate right now!",
  "Every morning I get hit by a bike. It's a vicious cycle!",
  "Did you hear about the 12 inch King? He was a lousy king but a terrific ruler!",
  "Why did the softball player bring string to the game? So she could tie the score!",
  "Why don't softball players ever get hot? Because they have so many fans!",
  "What do softball players eat on? Home plates!",
  "Why was the softball field so wet? Because the players kept running home!",
  "What's a softball player's favorite type of music? Swing music!",
  "Why did the softball player bring a ladder to practice? She heard the coach wanted her to reach new heights!",
  "What did the softball glove say to the ball? Catch ya later!",
  "Why did the coach go to the bank? To get her quarter back!",
  "What do you call a softball player who only hits singles? A cab driver!",
  "Why did the pitcher go to jail? She got caught throwing a curve!",
  "What do you call a bear who plays softball? A batting bear!",
  "Why did the outfielder bring an umbrella? She heard there was a chance of showers in the seventh inning!",
];
function getJokes(){return(DB.jokes&&DB.jokes.length)?DB.jokes:[...SEED_JOKES];}
function renderJokes(){
  const jokes=getJokes();
  const rand=jokes[Math.floor(Math.random()*jokes.length)];
  return `<div class="row" style="margin-bottom:18px">
    <h2 class="st">😄 Dad Jokes</h2><div class="f1"></div>
    <button class="btn btn-gold" onclick="addJoke()">+ Add Joke</button>
  </div>
  <div class="card" style="margin-bottom:22px;background:var(--gold)11;border:2px solid var(--gold)44;text-align:center;padding:22px 20px">
    <div style="font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px">🎲 Random Joke</div>
    <div style="font-size:17px;line-height:1.8;font-style:italic;margin-bottom:16px">"${esc(rand)}"</div>
    <button class="btn btn-gold btn-sm" onclick="document.getElementById('main').innerHTML=renderJokes()">🔀 Another one</button>
  </div>
  <div style="font-size:12px;color:var(--muted);margin-bottom:12px">${jokes.length} jokes in your collection</div>
  ${jokes.map((j,i)=>`<div class="card" style="margin-bottom:10px;border-left:4px solid var(--gold)">
    <div style="font-size:14px;line-height:1.7;margin-bottom:10px">${esc(j)}</div>
    <div class="row" style="gap:6px">
      <button class="btn btn-dim btn-sm" onclick="editJoke(${i})">Edit</button>
      <button class="btn btn-red btn-sm" onclick="deleteJoke(${i})">Delete</button>
    </div>
  </div>`).join('')}`;
}
function addJoke(){
  showModal(`${mhdr('Add a Dad Joke')}<div class="col">
    <div><div class="lbl">The Joke</div><textarea id="joke-txt" rows="3" placeholder="Why did the softball player…"></textarea></div>
    <div class="row"><button class="btn btn-gold" onclick="saveJoke(-1)">Add</button><button class="btn btn-dim" onclick="closeModal()">Cancel</button></div>
  </div>`);
}
function editJoke(idx){
  const j=getJokes()[idx]||'';
  showModal(`${mhdr('Edit Joke')}<div class="col">
    <div><div class="lbl">The Joke</div><textarea id="joke-txt" rows="3">${esc(j)}</textarea></div>
    <div class="row"><button class="btn btn-gold" onclick="saveJoke(${idx})">Save</button><button class="btn btn-dim" onclick="closeModal()">Cancel</button></div>
  </div>`);
}
function saveJoke(idx){
  const txt=document.getElementById('joke-txt').value.trim();if(!txt)return;
  const jokes=[...getJokes()];
  if(idx<0)jokes.push(txt);else jokes[idx]=txt;
  DB.jokes=jokes;scheduleSave();closeModal();renderTab();
}
function deleteJoke(idx){
  const jokes=[...getJokes()];jokes.splice(idx,1);
  DB.jokes=jokes;scheduleSave();renderTab();
}

window.addEventListener('DOMContentLoaded',()=>{
  renderSetup();
  if(gistId&&ghToken){
    gistLoad(gistId,ghToken).then(data=>{
      DB=data;
      document.getElementById('setup').style.display='none';
      document.getElementById('app').classList.remove('hidden');
      updateCounts();checkHash();
    }).catch(()=>{
      _step=3;renderSetup();
    });
  }
});
</script>
