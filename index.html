<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>⚡ HAMR Softball Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#0b0f1a;--surface:#141927;--card:#1c2236;--border:#2b3454;
  --gold:#f0a500;--green:#3ddc84;--red:#f16b6b;--blue:#5b8af5;--purple:#c97af5;
  --text:#e6eaf4;--muted:#7b88a8;--dim:#252e47;
  --cat-hitting:#f0a500;--cat-pitching:#5b8af5;--cat-fielding:#3ddc84;
  --cat-catching:#c97af5;--cat-baserunning:#f5a05b;--cat-conditioning:#f16b6b;--cat-other:#7b88a8;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--navy);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;overflow-x:hidden}
input,select,textarea,button{font-family:inherit;font-size:14px;outline:none}
input,select,textarea{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 12px;width:100%;transition:.15s}
input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(240,165,0,.15)}
textarea{resize:vertical;min-height:70px}
select option{background:var(--card)}
a{color:var(--gold);text-decoration:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── Layout ── */
#app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}
#hdr{background:var(--surface);border-bottom:2px solid var(--gold);padding:10px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:10}
#hdr .logo{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;color:var(--gold);letter-spacing:2px;line-height:1}
#hdr .sub{color:var(--muted);font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
#hdr-right{display:flex;align-items:center;gap:8px;margin-left:auto}
#hdr-counts{font-size:11px;color:var(--muted);display:flex;gap:10px}
#hdr-counts strong{color:var(--text)}
#save-status{font-size:11px;font-weight:700;min-width:60px;text-align:right}

/* ── Desktop Nav ── */
#nav{background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:2px;padding:6px 18px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
#nav::-webkit-scrollbar{display:none}
#nav button{background:transparent;border:none;color:var(--muted);padding:7px 16px;border-radius:7px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;white-space:nowrap;display:flex;align-items:center;gap:5px;transition:.12s}
#nav button:hover{background:var(--dim);color:var(--text)}
#nav button.active{background:var(--gold);color:#000}

/* ── Content ── */
#content{flex:1;overflow-y:auto;padding:20px;padding-bottom:24px}
.inner{max-width:1140px;margin:0 auto}

/* ── Mobile Nav ── */
#mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--surface);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom)}
#mob-nav .grid{display:grid;grid-template-columns:repeat(7,1fr)}
#mob-nav button{background:transparent;border:none;color:var(--muted);padding:7px 2px 5px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;font-size:8px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;width:100%}
#mob-nav button .ico{font-size:19px;line-height:1.2}
#mob-nav button.active{color:var(--gold)}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.surface{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.col{display:flex;flex-direction:column;gap:12px}
.f1{flex:1;min-width:0}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:5px;border:none;border-radius:8px;padding:9px 18px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;font-size:14px;transition:.12s;line-height:1}
.btn:active{transform:scale(.97)}
.btn-gold{background:var(--gold);color:#000}.btn-gold:hover{background:#ffc845}
.btn-green{background:var(--green);color:#000}
.btn-blue{background:var(--blue);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-dim{background:var(--dim);color:var(--text)}
.btn-dim:hover{background:#313d5f}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:7px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:5px}
label.btn{cursor:pointer}

/* ── Badges ── */
.badge{display:inline-block;border-radius:20px;padding:2px 9px;font-size:11px;font-weight:700;white-space:nowrap;line-height:1.4}
.lbl{font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;display:block}

/* ── Toggles ── */
.tog{border:1px solid var(--border);background:var(--surface);color:var(--muted);border-radius:7px;padding:5px 12px;font-size:12px;cursor:pointer;font-weight:700;font-family:inherit;transition:.1s;white-space:nowrap}
.tog:hover{border-color:var(--gold);color:var(--text)}
.tog.on{background:var(--gold);color:#000;border-color:var(--gold)}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:400;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;backdrop-filter:blur(2px)}
.mbox{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;width:100%;max-width:540px;box-shadow:0 24px 80px rgba(0,0,0,.7);margin:auto}
.mbox.wide{max-width:880px}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.mhdr h3{font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:800}
.xbtn{background:none;border:none;color:var(--muted);font-size:28px;cursor:pointer;line-height:1;padding:0;transition:.1s}
.xbtn:hover{color:var(--text)}

/* ── Misc ── */
.empty{text-align:center;color:var(--muted);padding:48px 20px;font-style:italic;font-size:13px}
.hidden{display:none!important}
h2.st{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;color:var(--gold);letter-spacing:1px}
.tip{font-size:12px;color:var(--muted);line-height:1.7}
pre.code{font-family:monospace;font-size:11px;background:var(--navy);color:var(--green);padding:14px;border-radius:8px;overflow:auto;max-height:200px;white-space:pre-wrap;word-break:break-all;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);color:var(--muted);font-size:10px;text-transform:uppercase;font-weight:700;letter-spacing:.5px}
td{padding:7px 10px;border-bottom:1px solid rgba(43,52,84,.35)}
.chart-wrap{width:100%;height:180px}
canvas{display:block;width:100%!important}

/* ── Drill cards ── */
.drill-card{cursor:pointer;transition:.1s;border-top:3px solid var(--border)}
.drill-card:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.35)}
.drill-desc{font-size:12px;color:var(--muted);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-top:5px}

/* ── Plan items ── */
.plan-item{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:12px;margin-bottom:8px}
.plan-item.dragging,.sblock.dragging{opacity:.4;border:2px dashed var(--gold)}
.plan-item.drag-over,.sblock.drag-over{border-color:var(--gold);background:var(--gold)11;transform:scale(1.01)}
.drag-handle{cursor:grab;color:var(--muted);font-size:18px;padding:0 4px;user-select:none;touch-action:none}
.drag-handle:active{cursor:grabbing}
.sblock{background:#131e30;border:2px solid var(--blue);border-radius:10px;padding:14px;margin-bottom:10px}
.sgrid{display:grid;gap:8px}
.scell{background:var(--surface);border-radius:8px;padding:10px;border:1px solid #5b8af533}

/* ── Stopwatch ── */
.sw-time{font-family:'Barlow Condensed',sans-serif;font-size:84px;font-weight:900;line-height:1;text-align:center;letter-spacing:3px;transition:color .2s}
.sw-btn{border:none;border-radius:50%;width:110px;height:110px;font-size:34px;font-weight:900;cursor:pointer;transition:.15s;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px}
.pchip{background:var(--surface);border:2px solid var(--border);border-radius:9px;padding:9px 6px;cursor:pointer;font-weight:700;font-size:12px;text-align:center;transition:.12s;line-height:1.3}
.pchip.on{background:var(--gold);border-color:var(--gold);color:#000}

/* ── Setup ── */
#setup{position:fixed;inset:0;background:var(--navy);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.setup-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;width:100%;max-width:600px}
.dots{display:flex;gap:6px;margin-bottom:24px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--dim);transition:.2s}
.dot.on{background:var(--gold)}

/* ── Mobile overrides ── */
@media(max-width:768px){
  #nav{display:none}
  #mob-nav{display:block}
  #content{padding:12px;padding-bottom:84px}
  .grid2{grid-template-columns:1fr}
  .grid-auto{grid-template-columns:1fr 1fr}
  .mbox{border-radius:14px 14px 0 0;max-height:92dvh;overflow-y:auto;margin:auto 0 0}
  .overlay{padding:0;align-items:flex-end}
  .sw-time{font-size:68px}
  .sw-btn{width:96px;height:96px}
  h2.st{font-size:24px}
  #hdr-counts{display:none}
}
@media(max-width:480px){
  .grid-auto{grid-template-columns:1fr}
  #hdr .sub{display:none}
}
@media print{#hdr,#nav,#mob-nav{display:none!important}#content{padding:0}}
</style>
</head>

  {id:"seed_36cc179f346f",name:"Basic Tee Work",category:"Hitting",url:"",tags:"tee work, contact, rotation, fundamentals, daily, swing mechanics, repetition, youth",description:"Simple high-rep tee rotation. Player takes 7–10 full swings off the tee, focusing on clean contact and consistent mechanics, then rotates with the next player.\n\nKeep it moving — the goal is volume and rhythm, not perfection. Coaches give one quick cue per round at most (e.g. 'stay back', 'head down', 'follow through').\n\nProgression:\n\u2022 Start: middle of plate, comfortable height\n\u2022 Move tee inside/outside to work different pitch locations\n\u2022 Move tee high/low to work swing plane\n\u2022 Call a target direction before each swing (pull, middle, opposite field)"},
  {id:"seed_36a3e5e2fec9",name:"Basic Infield Practice",category:"Fielding",url:"",tags:"infield, force outs, tag outs, ground balls, progression, fundamentals, game situations, throwing accuracy",description:"Progresses through infield fundamentals from simplest to game-realistic. Run each stage until the group is consistent before advancing.\n\nStage 1 — Force Outs at First:\n\u2022 Coach rolls or hits ground balls to each infield position\n\u2022 Fielder fields and throws to first base only\n\u2022 Focus: clean field, accurate throw, first baseman holds the bag\n\nStage 2 — Force Outs at Second:\n\u2022 Same setup but throw goes to second base\n\u2022 Shortstop or second baseman must cover and catch\n\u2022 Adds: footwork at second, turning a double play read\n\nStage 3 — Tag Outs:\n\u2022 Add baserunners — fielder must decide whether to tag or throw\n\u2022 Mix in slow rollers, hard shots, and pop-ups to keep it realistic\n\u2022 Emphasis: field first, then decide — no rushed throws\n\nCoaching cue: 'Know where you're going before the pitch.'"},
  {id:"seed_3ea8bd0d2bc9",name:"Basic Outfield Practice",category:"Fielding",url:"",tags:"outfield, fly balls, pop ups, drop step, moving left, moving right, moving in, moving back, fundamentals, progression, line drill",description:"Line drill — players stand in a line in the outfield. Coach feeds fly balls in a progressive sequence, cycling through all players before advancing to the next stage.\n\nStage 1 — Pop-Ups Nearby (straight up, comfortable):\n\u2022 Build confidence and footwork under easy balls\n\u2022 Call 'Mine!' and get under it with two hands\n\nStage 2 — Moving Left and Right:\n\u2022 Coach tosses to the player's left, then right\n\u2022 Drop step in the correct direction before moving\n\u2022 No crossing feet — open hips and run\n\nStage 3 — Moving In (shallow):\n\u2022 Short looping fly balls — player charges in aggressively\n\u2022 'When in doubt, come in' — it's easier than going back\n\u2022 Get down on one knee if ball drops short\n\nStage 4 — Moving Back (drop step focus):\n\u2022 Coach hits or throws balls over the player's head\n\u2022 Drop step immediately — turn and RUN, don't backpedal\n\u2022 Player should turn sideways and sprint at an angle\n\nKey cue: 'First step is always a drop step — commit to it before you think.' Do not advance stages until players are consistently executing the footwork."},
  {id:"seed_4006262df9e1",name:"Slapper Drill",category:"Hitting",url:"https://www.youtube.com/watch?v=KxiRBWTbuFc",tags:"slapping, slapper, left handed, running, contact, speed, footwork, timing, bunt, hit and run",description:"Drill for developing left-handed slappers — combines footwork, timing, and contact into one fluid motion.\n\nKey mechanics:\n\u2022 Crossover step toward the pitcher as the swing begins\n\u2022 Contact is made while already moving toward first base\n\u2022 Slap down on top of the ball — not a traditional swing\n\u2022 Eyes stay on the ball through contact\n\u2022 Sprint out of the box immediately after contact\n\nProgressions:\n\u2022 Start with footwork only — no ball, just the crossover step and run-through\n\u2022 Add soft toss — focus on timing the step with contact\n\u2022 Off the tee — work placement (slap to third base side)\n\u2022 Live pitching — full speed with full sprint\n\nCoaching cue: 'You're not hitting the ball, you're running through it.' The slap is most effective when the fielder has no time — speed out of the box is everything."},
  {id:"seed_53f1a8913893",name:"3 Counterbalance Throwing Drills",category:"Fielding",url:"https://www.youtube.com/watch?v=orelOBAAqjw",tags:"throwing mechanics, arm position, arm strength, velocity, counterbalance, L position, throwing harder, arm path, fundamentals",description:"Three progressive drills using counterbalance principles to fix arm position and generate more velocity.\n\nDrill 1 — Counterbalance Hold:\n\u2022 Player holds glove arm out in front as a counterweight\n\u2022 Forces the throwing arm to stay up and back in proper L position\n\u2022 Feel the balance point before releasing\n\nDrill 2 — Counterbalance Swing Through:\n\u2022 Both arms work together — glove pulls in as throwing arm fires\n\u2022 The glove-side pull creates hip and shoulder rotation\n\u2022 More rotation = more velocity without more arm stress\n\nDrill 3 — Full Throw with Counterbalance:\n\u2022 Apply both principles to a full throw\n\u2022 Focus on explosive hip turn, glove tucking tight to the body\n\u2022 Throwing arm finishes down and across — not slowing early\n\nCoaching cue: 'Pull the glove, don't just throw the ball.' The glove-side is half the throw — players who learn to use it add velocity immediately."},
  {id:"seed_3a60c5032334",name:"Scoop, Pinch, Throw",category:"Fielding",url:"",tags:"fielding mechanics, throwing mechanics, transfer, U to L, arm position, ground balls, fundamentals, progression, team drill, line drill",description:"Breaks down the full fielding-to-throw sequence into three isolated stages. Girls form a single vertical line and run through all three stages in order — no skipping ahead. The whole group does each stage together before moving on.\n\nStage 1 — The Scoop (fielding form only):\n\u2022 Coach rolls ground ball to each player in turn\n\u2022 Focus ONLY on getting in front of the ball, bending at the knees, soft hands, and fielding with a proper ramp/scoop\n\u2022 After fielding, the player simply rolls the ball back to the coach — NO throw\n\u2022 Coaching cue: 'Get in front of it. Scoop it, don't stab it.'\n\u2022 Repeat until the whole group is fielding with clean form\n\nStage 2 — The Pinch (scoop + transfer):\n\u2022 Same grounder, same clean scoop\n\u2022 Now players focus on the transfer: after fielding, bring the ball up through the U position into the L (arm up, elbow at shoulder height, forearm up)\n\u2022 Hold the L position for a beat — no throw yet\n\u2022 Coaching cue: 'Scoop it, then show me the L.' Check every player's arm position before moving on\n\nStage 3 — The Throw (full sequence + target):\n\u2022 Full sequence: scoop → pinch into L → make the throw\n\u2022 Set a target (cone, bucket, or mark on the fence) and see who can hit it\n\u2022 The competition makes them focus on accuracy, not just getting the ball there\n\u2022 Coaching cue: 'Scoop. Pinch. Throw at the target.' Say it out loud as a team cue\n\nKey principle: Do NOT move to the next stage until the group is consistent at the current one. The value is in the isolation — each stage earns the next."},
  {id:"seed_1abfbc4b121f",name:"Timing Drill",category:"Baserunning",url:"",tags:"speed, home to first, steal, full circuit, baserunning, assessment, stopwatch, timing, agility, competition",description:"Time every player through three segments. Log results in the Development tab (Home → 1st, Steal 2nd, Full Base Circuit). Run this at the start and end of the season to track improvement.\n\nSetup: One coach with a stopwatch at home plate. One coach at first base. Girls line up at home.\n\nSegment 1 — Home to First:\n\u2022 Player starts in batting stance at home plate\n\u2022 On 'GO!' she sprints through first base — not to it\n\u2022 Time stops when she hits the bag\n\u2022 Cue: 'Run through the bag, not to it. Sprint past.'\n\nSegment 2 — Steal 2nd (1st to 2nd):\n\u2022 Player takes a leadoff at first base\n\u2022 On 'GO!' she breaks for second using a sprinter start\n\u2022 Time stops when she hits the bag\n\u2022 Cue: 'Fast leaving, head down, trust your feet.'\n\nSegment 3 — Full Base Circuit (home to home):\n\u2022 Player starts at home plate\n\u2022 Sprints all four bases, hitting the inside corner of each\n\u2022 Time stops when she touches home\n\u2022 Cue: 'Hit the inside corner of every bag. Don't slow into turns.'\n\nRest 2–3 minutes between each segment. Record all three times per player and log them in the Development tab. Post the results — friendly competition motivates improvement."},
  {id:"seed_164f86b13b8c",name:"Basic Pitching Progression",category:"Pitching",url:"",tags:"pitching, wrist flicks, W drill, one leg, mechanics, arm circle, drive, progression, fundamentals, warm up, daily",description:"Three-stage pitching warmup and mechanics drill. Run in order every time — each stage earns the next. Great for opening a pitching session or teaching beginners the full motion.\n\nStage 1 — Wrist Flicks:\n\u2022 Pitcher stands close to catcher (10–15 feet), feet planted\n\u2022 Using only wrist snap, flick the ball to the catcher\n\u2022 Fingers on top of the ball, strong snap at release\n\u2022 Focus: feel the release point and spin\n\u2022 Cue: 'Snap it — don't push it.'\n\nStage 2 — W Drill (arm circle):\n\u2022 Pitcher stands at half distance, feet still planted\n\u2022 Arm makes a full W shape — back, up to 12 o'clock, through, and snap\n\u2022 Isolates the full arm circle without footwork\n\u2022 Coach watches for a complete 12 o'clock arm path — no shortcuts\n\u2022 Cue: 'Tall at the top. Don't cut the circle short.'\n\nStage 3 — One Leg (drive + balance):\n\u2022 Pitcher balances on drive leg (flamingo position)\n\u2022 Adds full arm circle and drives off the back leg to deliver\n\u2022 Forces an explosive push and proper weight transfer\n\u2022 No stride foot plant until the arm is committed\n\u2022 Cue: 'Load the leg, then explode. The arm follows the leg.'\n\nOnce all three stages are clean, move to full-speed pitching from the mound. These three stages can also be used mid-session to reset mechanics when a pitcher is struggling."},
  {id:"seed_7311dec6e204",name:"Dynamic Warmup — Catcher Focus",category:"Conditioning",url:"https://www.youtube.com/watch?v=AohAR4ZQ6Ho&t=37",tags:"dynamic warmup, catchers, mobility, flexibility, hip opener, squat, conditioning, warmup, daily, pre-practice",description:"Dynamic movement warmup especially beneficial for catchers, who spend extended time in deep squat positions. Run through the full sequence before any throwing or fielding work.\n\nKey movements in the sequence (see video starting at 0:37):\n\u2022 Hip circles and hip openers — loosens the hip flexors critical for catchers\n\u2022 Leg swings (front/back and side to side) — activates hamstrings and groin\n\u2022 Deep squat holds and rock-throughs — preps the catching stance position\n\u2022 Lunge variations with rotation — builds mobility through the thoracic spine\n\u2022 High knees and butt kicks — elevates heart rate\n\u2022 Lateral shuffles and carioca — gets lateral movement muscles firing\n\nEspecially important for catchers because:\n\u2022 Deep squat position compresses the hip joint — need to open it first\n\u2022 Explosive pop-ups from crouch require fully warm glutes and hamstrings\n\u2022 Throwing from the crouch demands full shoulder and thoracic mobility\n\nRun this before every practice for catchers. Other players benefit too — particularly infielders who need lateral hip mobility and outfielders who need hamstring activation."},
  {id:"seed_dab61ba23d43",name:"Catcher Everyday Drill",category:"Catching",url:"https://www.youtube.com/watch?v=htH5NjUxI2M&t=7",tags:"catcher, daily, warmup, receiving, blocking, pop up throw, footwork, framing, stance, every practice, everydays",description:"Daily warmup sequence for catchers — run this every practice before any game reps. Covers the core catcher skills in a quick, repeatable progression.\n\nSee video for full sequence. Key elements:\n\u2022 Receiving stance and ready position\n\u2022 Glove presentation and framing reps\n\u2022 Short hops — blocking technique and body positioning\n\u2022 Footwork for the pop-up throw to second\n\u2022 Throw-down reps at game speed\n\nRun through the full sequence before every practice. Just like Everydays for infield/outfield, this builds the muscle memory and consistency that makes catchers reliable under pressure.\n\nCue: 'Every rep is a game rep. Move like the runner is going.'"},
  {id:"seed_5ea6e0eff4ba",name:"Shoulder Drop Fix Drill",category:"Fielding",url:"https://youtu.be/TygeEMUCLwU?t=311",tags:"throwing mechanics, shoulder drop, arm path, elbow, L position, accuracy, velocity, fundamentals",description:"Fixes the most common throwing flaw in youth players — dropping the throwing shoulder, which kills accuracy and velocity.\n\nWhat shoulder drop looks like:\n\u2022 Throwing shoulder dips below the glove shoulder at release\n\u2022 Ball sails high or tails away\n\u2022 Arm drags behind the body\n\nThe fix:\n\u2022 Both shoulders stay level through the throw — think of a flat line from shoulder to shoulder\n\u2022 Glove side elbow pulls DOWN and IN as throwing arm fires (this keeps shoulders level)\n\u2022 Lead shoulder stays closed until hips rotate\n\u2022 Throwing elbow must be at or above shoulder height at release (the L position)\n\nDrill progression:\n\u2022 Mirror check: player watches herself in a mirror or phone camera — throw in slow motion and pause at release\n\u2022 Wall drill: stand close to wall, throw with focus on keeping the shoulder line flat\n\u2022 Partner check: partner watches from behind — calls out each rep as 'level' or 'drop'\n\nCue: 'Keep the shelf flat. Shoulders level, elbow up, glove pulls in.'"},
  {id:"seed_d1e41e03b28a",name:"Bare Hand Fielding Drill",category:"Fielding",url:"https://www.youtube.com/shorts/LIQwkqXuZeY",tags:"soft hands, stay low, fielding mechanics, bare hand, ground balls, infield, partner drill, fundamentals, daily",description:"Forces players to stay low and use soft hands by removing the glove. Partners face each other at short distance.\n\nRound 1 — Bare Hand (5 reps):\n\u2022 Partner tosses a ground ball\n\u2022 Player must field it bare-handed — no glove\n\u2022 To catch it cleanly they HAVE to get low, funnel it in, and use soft hands\n\u2022 Quick toss back to partner, partner quickly tosses the next one\n\u2022 Keep the pace brisk — this is reps, not conversation\n\nRound 2 — With Glove (5 reps):\n\u2022 Same drill, same pace, but now with the glove\n\u2022 The bare-hand round trains the body — the glove round locks it in\n\u2022 Player should immediately feel the difference and naturally stay lower\n\nCoaching cue: 'If you can catch it bare-handed, you can catch anything.' The instinct to protect the bare hand forces proper mechanics without any coaching required."},
  {id:"seed_192d12e7c962",name:"Hip Turn & Separation Drill",category:"Hitting",url:"https://www.youtube.com/shorts/z8qs6ebkuR8",drillType:"Warmup",tags:"hip turn, separation, hip-to-hand sequence, load, power, bat lag, pre-swing warmup, tee work prep, feel drill",description:"A feel drill to run before tee work begins. Teaches players to feel the hips firing first and the hands following — the foundation of a powerful swing.\n\nHow to run it:\n\u2022 Player holds bat in hitting position\n\u2022 Focus: fire the hips through the zone BEFORE the hands move\n\u2022 Exaggerate the separation — hips open fully while hands stay back\n\u2022 Feel the stretch/tension between the lower and upper body\n\u2022 Do 5\u201310 slow-motion reps just feeling the sequence, then move to the tee\n\nCoaching cue: 'Hips go first. Hands are just passengers until the hips fire.' Run this for 60 seconds before any tee session to activate the correct movement pattern. If a player is casting or rolling over, often it's because her hands are leading her hips — this drill resets that."},

function fmtTime(h24){if(!h24)return'';const[h,m]=h24.split(':').map(Number);const hh=h%12||12;return`${hh}:${String(m).padStart(2,'0')}${h<12?'am':'pm'}`;}

function parseCSV(text){
  const lines=text.trim().split(/\r?\n/);if(lines.length<2)return[];
  const hdrs=lines[0].split(',').map(h=>h.replace(/"/g,'').trim());
  return lines.slice(1).filter(l=>l.trim()).map(line=>{
    const vals=[];let cur='',inQ=false;
    for(const c of line){if(c==='"')inQ=!inQ;else if(c===','&&!inQ){vals.push(cur.trim());cur='';}else cur+=c;}
    vals.push(cur.trim());
    const obj={};hdrs.forEach((h,i)=>obj[h]=(vals[i]||'').replace(/^"|"$/g,''));return obj;
  });
}

async function gistLoad(gid,token){
  const r=await fetch(`https://api.github.com/gists/${gid}`,{
    headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'}
  });
  if(r.status===401)throw new Error('Invalid GitHub token — check your Personal Access Token');
  if(r.status===404)throw new Error('Gist not found — check your Gist ID');
  if(!r.ok)throw new Error('HTTP '+r.status);
  const gist=await r.json();
  const file=gist.files['hamr_hub.json'];
  if(!file)throw new Error('File hamr_hub.json not found in gist — make sure you named the file exactly hamr_hub.json');
  let data={};
  try{data=JSON.parse(file.content||'{}');}catch(e){data={};}
  const merged=Object.assign({},BLANK_DB,data);
  if(!merged.drills||merged.drills.length===0){
    merged.drills=SEED_DRILLS.map(d=>({...d})); // id already set in seed
  } else {
    const names=new Set(merged.drills.map(d=>d.name));
    const newD=SEED_DRILLS.filter(d=>!names.has(d.name));
    if(newD.length)merged.drills=[...merged.drills,...newD];
    // Also fix any existing drills whose IDs don't match seed — restore stable IDs
    const seedById=Object.fromEntries(SEED_DRILLS.map(d=>[d.name,d.id]));
    // Build old->new ID map before remapping
    const oldToNew={};
    merged.drills.forEach(d=>{if(seedById[d.name]&&d.id!==seedById[d.name])oldToNew[d.id]=seedById[d.name];});
    merged.drills=merged.drills.map(d=>seedById[d.name]?{...d,id:seedById[d.name]}:d);
    // Update all drill references inside plans to use new stable IDs
    if(Object.keys(oldToNew).length&&merged.plans){
      merged.plans=merged.plans.map(plan=>({...plan,items:(plan.items||[]).map(item=>{
        if(item.type==='station'){
          return {...item,
            drillId:item.drillId&&oldToNew[item.drillId]?oldToNew[item.drillId]:item.drillId,
            drillIds:(item.drillIds||[]).map(id=>oldToNew[id]||id)
          };
        }
        return {...item,drillId:item.drillId&&oldToNew[item.drillId]?oldToNew[item.drillId]:item.drillId};
      })}));
    }
  }
  if(!merged.players||merged.players.length===0){
    merged.players=SEED_PLAYERS.map(p=>({...p,id:uid()}));
  }
  if(!merged.playerSkills)merged.playerSkills=[];
  return merged;
}
async function gistSave(gid,token,data){
  const r=await fetch(`https://api.github.com/gists/${gid}`,{
    method:'PATCH',
    headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
    body:JSON.stringify({files:{'hamr_hub.json':{content:JSON.stringify(data)}}})
  });
  if(!r.ok)throw new Error('HTTP '+r.status);
}
function setSave(s){
  const el=document.getElementById('save-status');if(!el)return;
  if(s==='saving'){el.textContent='Saving…';el.style.color='var(--muted)';}
  else if(s==='saved'){el.textContent='✓ Saved';el.style.color='var(--green)';}
  else if(s==='err'){el.textContent='⚠ Save error';el.style.color='var(--red)';}
  else el.textContent='';
}
function scheduleSave(){
  clearTimeout(saveTimer);setSave('saving');
  saveTimer=setTimeout(async()=>{
    try{await gistSave(gistId,ghToken,DB);setSave('saved');setTimeout(()=>setSave(''),2500);}
    catch(e){setSave('err');console.error('Save failed:',e);}
  },800);
}

function exportBackup(){
  const b={_v:2,_label:'HAMR Softball Hub Backup',_date:new Date().toISOString(),
    players:DB.players,plans:DB.plans,metrics:DB.metrics,games:DB.games,
    gcStats:DB.gcStats,playerSkills:DB.playerSkills||[]};
  const blob=new Blob([JSON.stringify(b,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download=`HamrHub_Backup_${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
function importBackup(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const b=JSON.parse(ev.target.result);
      if(b._label!=='HAMR Softball Hub Backup')throw new Error('Not a valid backup');
      Object.assign(DB,{players:b.players||DB.players,plans:b.plans||DB.plans,
        metrics:b.metrics||DB.metrics,games:b.games||DB.games,
        gcStats:b.gcStats||DB.gcStats,playerSkills:b.playerSkills||[]});
      scheduleSave();renderTab();updateCounts();closeModal();
      setSave('saved');setTimeout(()=>setSave(''),2000);
    }catch(e){alert('Could not restore: '+e.message);}
  };
  reader.readAsText(file);input.value='';
}

function handleRosterCSV(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const rows=parseCSV(ev.target.result);
    const parsed=rows.map(row=>{
      const fn=row['Player First Name']||row['First Name']||row['FirstName']||'';
      const ln=row['Player Last Name']||row['Last Name']||row['LastName']||'';
      const name=(fn&&ln)?`${fn} ${ln}`.trim():(row['Player Name']||row['Name']||row[Object.keys(row)[0]]||'').trim();
      const num=(row['#']||row['Jersey']||row['Jersey #']||row['Number']||'').trim();
      const pos=(row['Position']||row['Positions']||'').split(/[,/]/).map(p=>p.trim().toUpperCase()).filter(p=>POSITIONS.includes(p));
      return{id:uid(),name,number:num,positions:pos,notes:''};
    }).filter(p=>p.name);
    const existing=new Set(DB.players.map(p=>p.name.toLowerCase()));
    const newP=parsed.filter(p=>!existing.has(p.name.toLowerCase()));
    document.getElementById('csv-preview').innerHTML=`
      <div style="color:var(--green);font-weight:700;margin-bottom:8px">Found ${parsed.length} players — ${newP.length} new</div>
      <div style="max-height:200px;overflow-y:auto;margin-bottom:10px">
        ${parsed.map(p=>{const dup=existing.has(p.name.toLowerCase());return`<div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);opacity:${dup?'.4':'1'};font-size:13px">
          <span class="f1" style="font-weight:600">${esc(p.name)}</span>
          ${p.number?`<span style="color:var(--muted)">#${esc(p.number)}</span>`:''}
          ${dup?'<span style="color:var(--red);font-size:11px">duplicate</span>':''}
        </div>`;}).join('')}
      </div>
      <div class="row">
        <button class="btn btn-gold" onclick='confirmCSV(${JSON.stringify(newP).replace(/'/g,"&#39;")})'>✓ Import ${newP.length} Players</button>
        <button class="btn btn-dim" onclick="closeModal()">Cancel</button>
      </div>`;
  };
  reader.readAsText(file);input.value='';
}
function confirmCSV(players){
  DB.players=[...DB.players,...players];closeModal();scheduleSave();renderTab();updateCounts();
}

function calcTS(){
  const ts={};
  if(!EP||!EP.startTime)return ts;
  const[sh,sm]=EP.startTime.split(':').map(Number);let mins=sh*60+sm;const seen=new Set();
  (EP.items||[]).forEach(item=>{
    const key=item.type==='station'?item.blockId:item.id;
    if(item.type==='station'&&seen.has(item.blockId))return;
    if(item.type==='station')seen.add(item.blockId);
    const dur=parseInt(item.duration)||0;
    const h=Math.floor(mins/60)%12||12,mn=String(mins%60).padStart(2,'0'),ap=mins<720?'am':'pm';
    const em=mins+dur,eh=Math.floor(em/60)%12||12,emn=String(em%60).padStart(2,'0'),eap=em<720?'am':'pm';
    ts[key]=dur>0?`${h}:${mn}${ap} – ${eh}:${emn}${eap}`:`${h}:${mn}${ap}`;
    mins+=dur;
  });
  return ts;
}

function rDPick(){

function rmBlk(bid){if(!EP)return;EP.items=EP.items.filter(i=>i.blockId!==bid);syncEP();rPE(!DB.plans.find(p=>p.id===EP.id));}

function updPI(id,f,v){if(!EP)return;const it=EP.items.find(i=>i.id===id);if(it){it[f]=v;if(f==='duration'){const ts=calcTS();document.querySelectorAll('[id^="ts-"]').forEach(e=>{const k=e.id.slice(3);if(ts[k])e.textContent='⏱ '+ts[k];});}}}
function addDrillToStation(stId,drillId){
  if(!EP||!drillId)return;

function mvPI(id,dir){if(!EP)return;const a=EP.items;const i=a.findIndex(x=>x.id===id);const ni=i+dir;if(ni<0||ni>=a.length)return;[a[i],a[ni]]=[a[ni],a[i]];syncEP();rPE(!DB.plans.find(p=>p.id===EP.id));}

// ── Drag and drop for plan items ──
let _dragKey=null; // item.id or blockId being dragged
let _dragIsBlock=false;
function onDragStart(e,key,isBlock){
  _dragKey=key;_dragIsBlock=isBlock;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',key);
  setTimeout(()=>{const el=document.getElementById('dnd-'+key);if(el)el.classList.add('dragging');},0);
}
function onDragEnd(e){
  document.querySelectorAll('.dragging,.drag-over').forEach(el=>{el.classList.remove('dragging','drag-over');});
  _dragKey=null;
}
function onDragOver(e,key,isBlock){
  e.preventDefault();e.dataTransfer.dropEffect='move';
  if(key===_dragKey)return;
  document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
  const el=document.getElementById('dnd-'+key);if(el)el.classList.add('drag-over');
}
function onDrop(e,targetKey,targetIsBlock){
  e.preventDefault();
  document.querySelectorAll('.dragging,.drag-over').forEach(el=>{el.classList.remove('dragging','drag-over');});
  if(!_dragKey||_dragKey===targetKey||!EP)return;
  syncEP();
  // Build groups
  const seen=new Set();const groups=[];
  EP.items.forEach(item=>{
    if(item.type==='station'){if(seen.has(item.blockId))return;seen.add(item.blockId);groups.push({key:item.blockId,isBlock:true,items:EP.items.filter(x=>x.blockId===item.blockId)});}
    else groups.push({key:item.id,isBlock:false,items:[item]});
  });
  const fromIdx=groups.findIndex(g=>g.key===_dragKey);
  const toIdx=groups.findIndex(g=>g.key===targetKey);
  if(fromIdx<0||toIdx<0)return;
  const moved=groups.splice(fromIdx,1)[0];
  groups.splice(toIdx,0,moved);
  EP.items=groups.flatMap(g=>g.items);
  _dragKey=null;
  rPE(!DB.plans.find(p=>p.id===EP.id));
}
function mvBlk(bid,dir){
  if(!EP)return;
  const seen=new Set();const groups=[];
  EP.items.forEach(item=>{
    if(item.type==='station'){if(seen.has(item.blockId))return;seen.add(item.blockId);groups.push(EP.items.filter(x=>x.blockId===item.blockId));}
    else groups.push([item]);
  });
  const gi=groups.findIndex(g=>g[0].blockId===bid);const ni=gi+dir;
  if(ni<0||ni>=groups.length)return;
  [groups[gi],groups[ni]]=[groups[ni],groups[gi]];
  EP.items=groups.flat();syncEP();rPE(!DB.plans.find(p=>p.id===EP.id));
}
function addSetupTask(){if(!EP)return;EP.setupTasks.push({task:'',coach:''});syncEP();rPE(!DB.plans.find(p=>p.id===EP.id));}
function addCoachTip(){if(!EP)return;if(!EP.coachTips)EP.coachTips=[];EP.coachTips.push({drillId:null,note:''});syncEP();rPE(!DB.plans.find(p=>p.id===EP.id));}
function rmCoachTip(i){if(!EP)return;EP.coachTips.splice(i,1);syncEP();rPE(!DB.plans.find(p=>p.id===EP.id));}
function updCoachTip(i,field,val){if(!EP||!EP.coachTips)return;EP.coachTips[i][field]=val;}
function rmSetupTask(i){if(!EP)return;EP.setupTasks.splice(i,1);syncEP();rPE(!DB.plans.find(p=>p.id===EP.id));}
function savePlan(isNew){
  if(!EP)return;syncEP();
  if(isNew){DB.plans.push(EP);}
  else{const i=DB.plans.findIndex(p=>p.id===EP.id);if(i>=0)DB.plans[i]=EP;}
  scheduleSave();
  // Stay in editor — just show a save confirmation and re-render the editor
  const wasNew=isNew;
  showPlanEditor(false);
  // Flash a saved indicator in the editor
  setTimeout(()=>{
    const btn=document.querySelector('[onclick^="savePlan"]');
    if(btn){const orig=btn.textContent;btn.textContent='✓ Saved!';btn.style.background='var(--green)';btn.style.color='#000';setTimeout(()=>{btn.textContent=orig;btn.style.background='';btn.style.color='';},1800);}
  },50);
}

// ── PLAN VIEW ──────────────────────────────────────────
function viewPlan(id){
  const p=DB.plans.find(x=>x.id===id);if(!p)return;
  // Update URL hash so this plan is directly linkable
  history.pushState(null,'','#plan/'+id);
  const tot=totalMin(p);
  // Build time schedule
  const ts={};
  if(p.startTime){
    const[sh,sm]=p.startTime.split(':').map(Number);let mins=sh*60+sm;const seen=new Set();
    (p.items||[]).forEach(item=>{
      const key=item.type==='station'?item.blockId:item.id;
      if(item.type==='station'&&seen.has(item.blockId))return;
      if(item.type==='station')seen.add(item.blockId);
      const dur=parseInt(item.duration)||0;
      const h=Math.floor(mins/60)%12||12,mn=String(mins%60).padStart(2,'0'),ap=mins<720?'am':'pm';
      const em=mins+dur,eh=Math.floor(em/60)%12||12,emn=String(em%60).padStart(2,'0'),eap=em<720?'am':'pm';

// ── EMAIL ──
function emailPlan(id){
  const p=DB.plans.find(x=>x.id===id);if(!p)return;
  const tot=totalMin(p);
  let t=`PRACTICE PLAN: ${p.title||'Untitled'}\n`;
  t+=`Date: ${p.date}`;
  if(p.startTime)t+=`  |  ${fmtTime(p.startTime)}${p.endTime?' – '+fmtTime(p.endTime):''}`;
  if(tot)t+=`  |  ~${tot} min`;t+='\n';
  if(p.notes)t+=`\nTHEME: ${p.notes}\n`;
  if((p.setupTasks||[]).length){t+='\n🔧 PRE-PRACTICE SETUP:\n';(p.setupTasks||[]).forEach((s,i)=>{t+=`${i+1}. ${s.task}${s.coach?' → '+s.coach:''}\n`;});}
  t+='\n═══════════════════════════════\n\n';
  const seen=new Set();let ti=0;
  (p.items||[]).forEach(item=>{
    if(item.type==='station'){
      if(seen.has(item.blockId))return;seen.add(item.blockId);
      const sts=(p.items||[]).filter(i=>i.blockId===item.blockId);
      t+=`[ STATIONS — simultaneously ]\n`;
      sts.forEach((st,si)=>{
        const d=st.drillId?getDrill(st.drillId):null;
        t+=`  ${st.stationLabel||'Station '+(si+1)}: ${d?d.name:(st.customName||'—')}`;
        if(st.duration)t+=` (${st.duration} min)`;if(st.coach)t+=`  COACH: ${st.coach}`;t+='\n';
        if(st.notes)t+=`    Notes: ${st.notes}\n`;
        if(d?.description)t+='\n'+d.description.split('\n').map(l=>'    '+l).join('\n')+'\n\n';
      });
    } else {
      ti++;
      const d=item.drillId?getDrill(item.drillId):null;
      const name=d?d.name:(item.customName||'Custom Activity');
      t+=`${ti}. ${name.toUpperCase()}${d?'  ['+d.category+']':''}\n`;
      if(item.duration)t+=`   DURATION: ${item.duration} min\n`;
      if(item.coach)t+=`   COACH: ${item.coach}\n`;
      if(item.notes)t+=`   NOTES: ${item.notes}\n`;
      if(d?.description)t+='\n'+d.description.split('\n').map(l=>'   '+l).join('\n')+'\n';
      t+='\n───────────────────────────────\n\n';
    }
  });
  t+='Generated by ⚡ HAMR Softball Hub';
  window.open(`mailto:?subject=${encodeURIComponent('Practice Plan: '+(p.title||'Untitled')+' — '+p.date)}&body=${encodeURIComponent(t)}`);
}

let _skillPid='';
function renderSkills(){

  const selP=DB.players.find(p=>p.id===_skillPid);
  const allTags=[...new Set(DB.drills.flatMap(d=>(d.tags||'').split(',').map(t=>t.trim()).filter(Boolean)))].sort();
  const freq={};ps.forEach(e=>e.skills.forEach(s=>{freq[s]=(freq[s]||[]).concat(e.playerId);}));
  const teamNeeds=Object.entries(freq).sort((a,b)=>b[1].length-a[1].length).slice(0,8);
  const focus=sel?.skills||[];
  const recs=focus.length===0?[]:DB.drills.map(d=>{
    const hay=(d.name+' '+(d.tags||'')+' '+(d.description||'')).toLowerCase();
    const m=focus.filter(s=>hay.includes(s));return{d,m,s:m.length};
  }).filter(r=>r.s>0).sort((a,b)=>b.s-a.s);

  const today=new Date();
  const pList=DB.players.map(p=>{const e=getE(p.id);const on=p.id===_skillPid;
    const lastSent=e.lastSent||null;
    const daysSince=lastSent?Math.floor((today-new Date(lastSent))/(1000*60*60*24)):null;
    const overdue=daysSince!==null&&daysSince>14;
    const fresh=daysSince!==null&&daysSince<=7;
    const sentLabel=lastSent?`Sent ${daysSince===0?'today':daysSince===1?'yesterday':daysSince+' days ago'}`:'Never sent';
    const sentColor=fresh?'var(--green)':overdue?'var(--red)':'var(--muted)';
    return `<div onclick="_skillPid='${p.id}';renderTab()" style="display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;cursor:pointer;background:${on?'var(--gold)22':'var(--surface)'};border:1px solid ${on?'var(--gold)66':overdue?'var(--red)33':'var(--border)'};margin-bottom:5px;transition:.1s">
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;color:${on?'var(--gold)':'var(--muted)'};min-width:30px">#${esc(p.number||'—')}</div>
      <div class="f1">
        <div style="font-weight:700;font-size:13px">${esc(p.name)}</div>
        <div style="font-size:11px;color:var(--muted)">${e.skills.length?e.skills.length+' focus skills':'No focus skills yet'}</div>

  const tnHtml=teamNeeds.length?teamNeeds.map(([sk,pids])=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">

  </div>`).join(''):'<div style="font-size:12px;color:var(--muted)">Add skills to players to see team patterns.</div>';

  const QUICK=['casting','footwork','drop step','communication','throwing accuracy','soft hands','load','hip coil','base running','blocking','receiving','hesitation','first step','lateral movement','extension','pop up throw'];
  const qpills=QUICK.filter(s=>!sel?.skills.includes(s)).map(s=>`<span onclick="addSkill('${_skillPid}','${s}')" style="background:var(--dim);color:var(--muted);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;cursor:pointer;display:inline-block;margin-bottom:4px">+ ${s}</span>`).join(' ');

            <span class="badge" style="background:${s>=3?'var(--green)':s>=2?'var(--gold)':'var(--dim)'}22;color:${s>=3?'var(--green)':s>=2?'var(--gold)':'var(--muted)'};font-size:10px">${s} skill${s!==1?'s':''} matched</span>
            ${vid?'<span class="badge" style="background:var(--red)22;color:var(--red);font-size:10px">📹 Video</span>':''}
          </div>
        </div>
        ${vid?`<a href="${esc(d.url)}" target="_blank" style="font-size:18px;text-decoration:none">▶️</a>`:''}
      </div>
      <div class="row" style="gap:4px;flex-wrap:wrap;margin-bottom:${vid?'8':'0'}px">${m.map(s=>`<span class="badge" style="background:var(--green)22;color:var(--green);font-size:10px">✓ ${esc(s)}</span>`).join('')}</div>

    </div>`;
  }).join('');

  // Count overdue players (have skills, haven't been sent in 14+ days)
  const overdueCount=DB.players.filter(p=>{
    const e=getE(p.id);if(!e.skills.length)return false;
    if(!e.lastSent)return true;
    return Math.floor((today-new Date(e.lastSent))/(1000*60*60*24))>14;
  }).length;
  const neverSentCount=DB.players.filter(p=>{const e=getE(p.id);return e.skills.length&&!e.lastSent;}).length;

  return `<div class="row" style="margin-bottom:18px"><h2 class="st">⭐ Player Skills</h2><div class="f1"></div>
    ${overdueCount>0?`<span class="badge" style="background:var(--red)22;color:var(--red);border:1px solid var(--red)44">⚠ ${overdueCount} player${overdueCount!==1?'s':''} overdue for homework</span>`:''}
    ${sel?.skills.length?`<span class="badge" style="background:var(--gold)22;color:var(--gold)">${recs.length} drills recommended</span>`:''}
  </div>
  <div style="display:grid;grid-template-columns:270px 1fr;gap:16px;align-items:start">
    <div>
      <div class="card" style="margin-bottom:12px;padding:14px"><div class="lbl" style="margin-bottom:8px">Select Player</div>${pList}</div>
      <div class="card" style="padding:14px"><div class="lbl" style="margin-bottom:8px">Team Focus Areas</div>${tnHtml}</div>
    </div>
    <div>
      ${sel&&selP?`<div class="card" style="margin-bottom:14px">
        <div style="font-weight:700;font-size:14px;margin-bottom:12px">#${esc(selP.number||'—')} ${esc(selP.name)} — Focus Skills</div>
        ${sel.skills.length?`<div class="row" style="margin-bottom:12px;flex-wrap:wrap;gap:6px">${sel.skills.map(s=>`<div style="display:flex;align-items:center;gap:4px;background:var(--gold)22;border:1px solid var(--gold)55;border-radius:20px;padding:4px 10px 4px 12px;font-size:12px;font-weight:700;color:var(--gold)">${esc(s)}<button onclick="rmSkill('${_skillPid}','${esc(s)}')" style="background:none;border:none;color:var(--gold);cursor:pointer;font-size:14px;line-height:1;padding:0 0 0 3px">×</button></div>`).join('')}</div>`:
        `<div style="color:var(--muted);font-size:13px;margin-bottom:12px;font-style:italic">No focus skills yet — add some below.</div>`}
        <div class="lbl">Add a Focus Skill</div>
        <div class="row" style="gap:8px">
          <input id="sk-inp" class="f1" placeholder="e.g. casting, footwork, drop step…" list="sk-list" onkeydown="if(event.key==='Enter')addSkillInp()"/>
          <datalist id="sk-list">${allTags.map(t=>`<option value="${esc(t)}">`).join('')}</datalist>

        ${recsHtml||'<div class="empty">No drills match these skills yet.</div>'}
      `:''}
      `:'<div class="empty">← Select a player to manage their focus skills and get drill recommendations.</div>'}
    </div>

function addSkill(pid,s){
  const sk=s.trim().toLowerCase();if(!sk)return;
  const ps=DB.playerSkills||[];
  const idx=ps.findIndex(e=>e.playerId===pid);
  if(idx>=0){if(!ps[idx].skills.includes(sk))ps[idx].skills.push(sk);}
  else ps.push({playerId:pid,skills:[sk]});
  DB.playerSkills=ps;scheduleSave();renderTab();
}
function addSkillInp(){const v=document.getElementById('sk-inp')?.value;if(v&&_skillPid)addSkill(_skillPid,v);}
function rmSkill(pid,s){
  const ps=DB.playerSkills||[];const idx=ps.findIndex(e=>e.playerId===pid);
  if(idx>=0){ps[idx].skills=ps[idx].skills.filter(x=>x!==s);scheduleSave();renderTab();}
}
function toggleHw(pid,drillId){
  const ps=DB.playerSkills||[];
  const idx=ps.findIndex(e=>e.playerId===pid);
  if(idx<0)return;
  const hw=ps[idx].homework||[];
  ps[idx].homework=hw.includes(drillId)?hw.filter(id=>id!==drillId):[...hw,drillId];
  DB.playerSkills=ps;scheduleSave();renderTab();
}
function clearHomework(pid){
  const ps=DB.playerSkills||[];
  const idx=ps.findIndex(e=>e.playerId===pid);
  if(idx<0)return;
  ps[idx].homework=[];
  DB.playerSkills=ps;scheduleSave();renderTab();
}

let _devM='homeToFirst',_devPid='';
let _SW={on:false,metric:null,pid:'',elapsed:0,start:0,saved:null,log:[],raf:null};

function renderDev(){
  const el=document.getElementById('main');if(!el)return;
  const mdef=METRIC_TYPES.find(m=>m.key===_devM)||METRIC_TYPES[0];
  const lb=DB.players.map(p=>{
    const ents=DB.metrics.filter(m=>m.playerId===p.id&&m.metricKey===_devM).sort((a,b)=>b.date.localeCompare(a.date));
    const lat=ents[0]||null,prev=ents[1]||null;
    return{p,lat,delta:(lat&&prev)?lat.value-prev.value:null,cnt:ents.length};
  }).sort((a,b)=>{if(!a.lat&&!b.lat)return 0;if(!a.lat)return 1;if(!b.lat)return-1;return mdef.lowerBetter?a.lat.value-b.lat.value:b.lat.value-a.lat.value;});
  const selEnts=DB.metrics.filter(m=>m.playerId===_devPid&&m.metricKey===_devM).sort((a,b)=>b.date.localeCompare(a.date));
  const selP=DB.players.find(p=>p.id===_devPid);
  const mbtns=METRIC_TYPES.map(m=>`<button class="tog${_devM===m.key?' on':''}" onclick="_devM='${m.key}';renderDev()">${m.label}</button>`).join('');
  const timed=METRIC_TYPES.filter(m=>m.lowerBetter);
  const manual=METRIC_TYPES.filter(m=>!m.lowerBetter);
  const swbtns=timed.map(m=>`<button class="btn btn-dim btn-sm" onclick="openSW('${m.key}')">⏱ ${m.label}</button>`).join('');
  const mbtns2=manual.map(m=>`<button class="btn btn-dim btn-sm" style="color:var(--muted)" onclick="openManual('${m.key}')">📝 ${m.label}</button>`).join('');
  const lbRows=lb.map((row,i)=>{
    const on=row.p.id===_devPid;
    const dc=row.delta===null?'':(mdef.lowerBetter?row.delta<0:row.delta>0)?'var(--green)':'var(--red)';
    return `<div onclick="_devPid='${row.p.id}';renderDev()" style="display:flex;align-items:center;gap:8px;padding:9px;border-radius:8px;cursor:pointer;margin-bottom:4px;background:${on?'var(--gold)22':'transparent'};border:1px solid ${on?'var(--gold)44':'transparent'};transition:.1s">
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;color:${i===0&&row.lat?'var(--gold)':'var(--muted)'};min-width:22px;text-align:center">${row.lat?i+1:'—'}</div>
      <div class="f1"><div style="font-weight:600;font-size:13px">#${esc(row.p.number||'—')} ${esc(row.p.name)}</div><div style="font-size:10px;color:var(--muted)">${row.cnt} measurements</div></div>
      <div style="text-align:right">${row.lat?`<div style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:var(--gold);line-height:1">${row.lat.value}<span style="font-size:11px;font-weight:400"> ${mdef.unit}</span></div>${row.delta!==null?`<div style="font-size:10px;color:${dc}">${row.delta>0?'+':''}${row.delta.toFixed(2)}</div>`:''}`:'<div style="color:var(--dim);font-size:11px">No data</div>'}</div>
    </div>`;
  }).join('');
  const histRows=selEnts.map(m=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px">
    <span style="color:var(--muted);min-width:78px">${m.date}</span>
    <span style="font-weight:700;color:var(--gold)">${m.value} ${mdef.unit}</span>
    ${m.notes?`<span style="color:var(--muted);f1:1;font-size:11px">${esc(m.notes)}</span>`:''}
    <button class="btn btn-red btn-xs" onclick="delMetric('${m.id}')">✕</button>
  </div>`).join('');

  el.innerHTML=`<div class="row" style="margin-bottom:18px"><h2 class="st">📈 Player Development</h2><div class="f1"></div>${DB.players.length?`<button class="btn btn-gold" onclick="openManual('')">+ Log Manual</button>`:''}</div>
  <div class="surface" style="margin-bottom:14px">
    <div style="font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:700">⏱ Stopwatch (tap to launch):</div>
    <div class="row" style="gap:6px;flex-wrap:wrap">${swbtns}</div>
    <div style="font-size:12px;color:var(--muted);margin:10px 0 8px;font-weight:700">📝 Manual Entry (Pocket Radar):</div>
    <div class="row" style="gap:6px;flex-wrap:wrap">${mbtns2}</div>
  </div>
  <div class="lbl" style="margin-bottom:6px">View by Metric</div>
  <div class="row" style="gap:5px;margin-bottom:16px;flex-wrap:wrap">${mbtns}</div>
  <div class="grid2">
    <div class="card"><div style="font-weight:700;margin-bottom:12px;font-size:14px">${mdef.label} — Leaderboard</div>
      ${DB.players.length?lbRows:'<div style="color:var(--muted);font-size:12px">Add players first.</div>'}
    </div>
    <div>
      <div class="card" style="margin-bottom:12px">
        <div style="font-weight:700;margin-bottom:10px;font-size:13px">${selP?`Progress: ${selP.name}`:'Select a player →'}</div>
        <div class="chart-wrap"><canvas id="dev-chart"></canvas></div>
      </div>
      ${_devPid?`<div class="card"><div style="font-weight:700;margin-bottom:8px;font-size:13px">History</div>
        ${selEnts.length?'':'<div style="color:var(--muted);font-size:12px">No entries yet.</div>'}
        <div style="max-height:200px;overflow-y:auto">${histRows}</div>
      </div>`:''}
    </div>
  </div>`;
  setTimeout(drawChart,30);
}
function drawChart(){
  const canvas=document.getElementById('dev-chart');if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const mdef=METRIC_TYPES.find(m=>m.key===_devM);
  const ents=DB.metrics.filter(m=>m.playerId===_devPid&&m.metricKey===_devM).sort((a,b)=>a.date.localeCompare(b.date));
  const W=canvas.offsetWidth||380,H=180;
  canvas.width=W;canvas.height=H;ctx.clearRect(0,0,W,H);
  if(ents.length<2){ctx.fillStyle='#7b88a8';ctx.font='13px DM Sans';ctx.textAlign='center';ctx.fillText(_devPid?'Need 2+ data points to show chart':'Select a player on the left',W/2,H/2);return;}
  const vals=ents.map(e=>e.value),dates=ents.map(e=>e.date.slice(5));
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const P={t:16,r:12,b:32,l:42},cw=W-P.l-P.r,ch=H-P.t-P.b;
  const px=i=>P.l+(i/(ents.length-1))*cw,py=v=>P.t+ch-((v-mn)/rng)*ch;
  ctx.strokeStyle='#2b3454';ctx.lineWidth=1;
  [0,.25,.5,.75,1].forEach(f=>{const y=P.t+ch*f;ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(W-P.r,y);ctx.stroke();ctx.fillStyle='#7b88a8';ctx.font='10px DM Sans';ctx.textAlign='right';ctx.fillText((mn+rng*(1-f)).toFixed(1),P.l-3,y+3);});
  ctx.fillStyle='#7b88a8';ctx.font='10px DM Sans';ctx.textAlign='center';
  ents.forEach((_,i)=>{if(i===0||i===ents.length-1)ctx.fillText(dates[i],px(i),H-5);});
  ctx.strokeStyle='#f0a500';ctx.lineWidth=2.5;ctx.lineJoin='round';
  ctx.beginPath();ents.forEach((e,i)=>{i===0?ctx.moveTo(px(i),py(e.value)):ctx.lineTo(px(i),py(e.value));});ctx.stroke();
  ents.forEach((e,i)=>{ctx.beginPath();ctx.arc(px(i),py(e.value),4,0,Math.PI*2);ctx.fillStyle='#f0a500';ctx.fill();});
}
function delMetric(id){DB.metrics=DB.metrics.filter(m=>m.id!==id);scheduleSave();renderDev();}

function openManual(mk){
  const mOpts=METRIC_TYPES.map(m=>`<option value="${m.key}"${m.key===mk?' selected':''}>${m.label} (${m.unit})</option>`).join('');

  showModal(`${mhdr('Log Measurement')}
    <div class="col">
      <div><div class="lbl">Player</div><select id="m-p">${pOpts}</select></div>
      <div><div class="lbl">Metric</div><select id="m-m">${mOpts}</select></div>
      <div class="row" style="gap:10px">
        <div class="f1"><div class="lbl">Value</div><input type="number" id="m-v" placeholder="0.00" step="0.01"/></div>

}
function saveManual(){
  const pid=document.getElementById('m-p').value,mk=document.getElementById('m-m').value;
  const val=parseFloat(document.getElementById('m-v').value),date=document.getElementById('m-d').value;
  if(!pid||isNaN(val)||!date)return;
  DB.metrics.push({id:uid(),playerId:pid,metricKey:mk,value:val,date,notes:document.getElementById('m-n').value.trim()});
  closeModal();scheduleSave();renderDev();
}

// ── STOPWATCH ──────────────────────────────────────────
function openSW(mk){
  _SW={on:false,metric:mk,pid:DB.players[0]?.id||'',elapsed:0,start:0,saved:null,log:[],raf:null};
  showSW();
}
function showSW(){
  const mdef=METRIC_TYPES.find(m=>m.key===_SW.metric)||METRIC_TYPES[0];
  const s=Math.floor(_SW.elapsed/1000),ms=Math.floor((_SW.elapsed%1000)/10);
  const t=`${s}.${String(ms).padStart(2,'0')}`;
  const tcol=_SW.on?'var(--green)':_SW.saved!==null?'var(--gold)':'var(--text)';
  const chips=DB.players.map(p=>`<div class="pchip${p.id===_SW.pid?' on':''}" onclick="${_SW.on?'':`_SW.pid='${p.id}';showSW()`}">
    <div style="font-size:10px;color:${p.id===_SW.pid?'#000':'var(--muted)'}">#${esc(p.number||'—')}</div>
    <div>${esc(p.name.split(' ')[0])}</div>
  </div>`).join('');
  const logHtml=_SW.log.length?`<div class="surface" style="width:100%">
    <div class="lbl" style="margin-bottom:8px">✓ Saved this session (${_SW.log.length})</div>
    ${_SW.log.map(e=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:13px;font-weight:600">${esc(e.name)}</span>
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--green)">${e.s}s</span>
    </div>`).join('')}
  </div>`:'';
  showModal(`${mhdr('⏱ '+mdef.label)}
    <div class="col" style="align-items:center">
      <div style="width:100%">
        <div class="lbl" style="margin-bottom:6px">Player</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(85px,1fr));gap:6px">${chips}</div>
      </div>
      <div class="sw-time" style="color:${tcol}">${t}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:-8px">seconds</div>
      <button class="sw-btn" onclick="swToggle()" style="background:${_SW.on?'var(--red)':'var(--green)'};color:#000;box-shadow:0 0 24px ${_SW.on?'var(--red)':'var(--green)'}66">${_SW.on?'STOP':'GO!'}</button>
      <div class="row" style="gap:10px">
        <button class="btn btn-dim" onclick="swReset()">↺ Reset</button>
        ${_SW.saved!==null?`<span style="font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--gold)">${_SW.saved}s</span><button class="btn btn-gold" onclick="swSave()">✓ Save</button>`:''}
      </div>
      ${_SW.saved!==null?`<div style="font-size:11px;color:var(--muted);text-align:center">Hit ↺ Reset to time the next player</div>`:''}
      ${logHtml}
    </div>`);
}
function swTick(){
  _SW.elapsed=Date.now()-_SW.start;
  const s=Math.floor(_SW.elapsed/1000),ms=Math.floor((_SW.elapsed%1000)/10);
  const el=document.querySelector('.sw-time');
  if(el)el.textContent=`${s}.${String(ms).padStart(2,'0')}`;
  if(_SW.on)_SW.raf=requestAnimationFrame(swTick);
}
function swToggle(){
  if(_SW.on){cancelAnimationFrame(_SW.raf);_SW.on=false;_SW.saved=parseFloat((_SW.elapsed/1000).toFixed(2));}
  else{_SW.saved=null;_SW.start=Date.now()-_SW.elapsed;_SW.on=true;_SW.raf=requestAnimationFrame(swTick);}
  showSW();
}
function swReset(){cancelAnimationFrame(_SW.raf);_SW.on=false;_SW.elapsed=0;_SW.saved=null;showSW();}
function swSave(){
  if(_SW.saved===null)return;
  const p=DB.players.find(x=>x.id===_SW.pid);
  DB.metrics.push({id:uid(),playerId:_SW.pid,metricKey:_SW.metric,value:_SW.saved,date:new Date().toISOString().slice(0,10),notes:'Stopwatch'});
  _SW.log=[{name:p?.name.split(' ')[0]||'?',s:_SW.saved},..._SW.log];
  scheduleSave();swReset();
}

function migrateInningGrid(){
  if(!EG||!EG.inningGrid)return;
  const validPids=new Set((EG.lineup||[]).map(e=>e.playerId));
  const newGrid={};
  // Two-pass: first collect new-format entries, then layer in old-format (without overwriting)
  Object.entries(EG.inningGrid).forEach(([inn,cells])=>{
    newGrid[inn]=newGrid[inn]||{};
    // Pass 1: new-format entries (key IS a valid pid, no playerId property in cell)
    Object.entries(cells).forEach(([key,cell])=>{
      if(cell&&typeof cell==='object'&&!cell.playerId&&validPids.has(key)){
        newGrid[inn][key]=cell;
      }
    });
    // Pass 2: old-format entries (cell has playerId property) — only migrate if no new entry exists
    Object.entries(cells).forEach(([key,cell])=>{
      if(cell&&typeof cell==='object'&&cell.playerId&&validPids.has(cell.playerId)){
        const pid=cell.playerId;
        if(!newGrid[inn][pid]){
          const {playerId:_,...rest}=cell;
          newGrid[inn][pid]=rest;
        }
      }
    });
  });
  EG.inningGrid=newGrid;
  // Migrate altGrid too
  ['winning'].forEach(scenario=>{
    if(!EG.altGrid?.[scenario])return;
    const newAlt={};
    Object.entries(EG.altGrid[scenario]).forEach(([key,cell])=>{
      if(cell&&cell.playerId&&validPids.has(cell.playerId)){
        if(!newAlt[cell.playerId])newAlt[cell.playerId]={position:cell.position||''};
      } else if(validPids.has(key)){
        newAlt[key]=cell;
      }
    });
    EG.altGrid[scenario]=newAlt;
  });
}
